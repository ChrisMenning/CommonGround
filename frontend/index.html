<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CommonGround — civic community intelligence for Green Bay / Brown County">
  <!-- No analytics, no tracking, no external scripts -->
  <title>CommonGround</title>

  <!-- MapLibre GL CSS — vendored locally, no CDN -->
  <link rel="stylesheet" href="vendor/maplibre-gl.css">

  <style>
    /* ── Design tokens: Solarpunk Brutalism ── */
    :root {
      --soil:          #1A1208;
      --bark:          #2D1F0E;
      --bark-light:    #3D2A14;
      --leaf:          #5A7A32;
      --sprout:        #7FA843;
      --amber:         #D4A017;
      --amber-dim:     #9A7210;
      --text-primary:  #E8D5A3;
      --text-secondary:#B8A070;
      --text-muted:    #B09070;
      --border:        #4A3520;
      --danger:        #C0392B;
      --font-label:    'Courier New', 'Courier', monospace;
      --font-body:     Georgia, 'Times New Roman', serif;
    }

    /* ── Accessibility utilities ── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      background: var(--sprout);
      color: var(--soil);
      font-family: var(--font-label);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 8px 14px;
      z-index: 9999;
      text-decoration: none;
      text-transform: uppercase;
    }

    .skip-link:focus {
      top: 0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--soil);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: grid;
      grid-template-columns: 52px auto 1fr;
      grid-template-rows: 1fr auto;
      height: 100vh;
    }

    /* ── App Bar (52px icon strip) ── */
    #app-bar {
      grid-column: 1;
      grid-row: 1 / 3;
      background: var(--soil);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      width: 52px;
      flex-shrink: 0;
    }

    #app-bar-logo {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-label);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--sprout);
      font-weight: bold;
      flex-shrink: 0;
    }

    .app-bar-nav {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 4px 0;
    }

    .app-bar-bottom {
      border-top: 1px solid var(--border);
      padding: 4px 0;
    }

    .app-bar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 9px 4px 7px;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--font-label);
      font-size: 7px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      width: 100%;
      position: relative;
      transition: background 0.1s, color 0.1s;
    }

    .app-bar-btn:hover {
      background: var(--bark-light);
      color: var(--text-primary);
    }

    .app-bar-btn.active {
      background: var(--bark);
      color: var(--sprout);
      border-left-color: var(--sprout);
    }

    .app-bar-icon {
      position: relative;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-bar-icon svg {
      width: 18px;
      height: 18px;
    }

    .app-bar-count {
      position: absolute;
      top: 5px;
      right: 4px;
      min-width: 14px;
      height: 14px;
      background: var(--amber);
      color: var(--soil);
      border-radius: 7px;
      font-family: var(--font-label);
      font-size: 8px;
      line-height: 14px;
      text-align: center;
      padding: 0 3px;
      pointer-events: none;
    }

    /* ── Side Panel (slides open) ── */
    #side-panel {
      grid-column: 2;
      grid-row: 1 / 3;
      background: var(--bark);
      border-right: 2px solid var(--border);
      overflow: hidden;
      width: 0;
      transition: width 0.22s ease;
      z-index: 9;
      position: relative;
    }

    #side-panel.open {
      width: 280px;
    }

    .panel {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      width: 280px;
      overflow: hidden;
    }

    .panel.active {
      display: flex;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 8px;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header-title {
      font-family: var(--font-label);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--sprout);
      text-transform: uppercase;
      flex: 1;
    }

    .panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .panel-close:hover {
      color: var(--text-primary);
    }

    #map-container {
      grid-column: 3;
      grid-row: 1;
      position: relative;
    }

    #map {
      width: 100%; height: 100%;
    }

    #status-bar {
      grid-column: 3;
      grid-row: 2;
      background: var(--bark);
      border-top: 1px solid var(--border);
      padding: 4px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-label);
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    /* ── Sidebar sections ── */
    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }

    .section-label {
      font-family: var(--font-label);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Layer controls ── */
    #layer-controls {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--bark-light) var(--bark);
    }

    .layer-group-label {
      font-family: var(--font-label);
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 6px 16px 2px;
    }

    .layer-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      font-family: var(--font-label);
      font-size: 11px;
      color: var(--text-secondary);
      transition: background 0.1s;
      user-select: none;
    }

    .layer-opacity-row {
      display: none;
      flex-basis: 100%;
      align-items: center;
      gap: 6px;
      padding: 0 0 5px 18px;
      margin-top: -2px;
    }
    .layer-item.active .layer-opacity-row {
      display: flex;
    }
    .layer-opacity-row input[type=range] {
      flex: 1;
      height: 3px;
      accent-color: var(--sprout);
      cursor: pointer;
      background: transparent;
    }

    .layer-item:hover {
      background: var(--bark-light);
      color: var(--text-primary);
    }

    .layer-item.active {
      color: var(--sprout);
    }

    .layer-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .layer-toggle {
      width: 28px; height: 14px;
      border: 1px solid var(--text-muted);
      border-radius: 7px;
      background: var(--bark-light);
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .layer-toggle::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      top: 1px; left: 1px;
      transition: transform 0.15s, background 0.15s;
    }

    .layer-item.active .layer-toggle {
      background: var(--leaf);
      border-color: var(--sprout);
    }

    .layer-item.active .layer-toggle::after {
      transform: translateX(14px);
      background: var(--sprout);
    }

    .trust-pip {
      font-family: 'Segoe UI Symbol', 'Apple Color Emoji', 'Noto Sans Symbols', var(--font-label);
      font-size: 9px;
      color: var(--text-muted);
      margin-left: auto;
      letter-spacing: 0;
    }

    /* ── Alert panel ── */
    #alert-panel {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bark-light) var(--bark);
    }

    #organize-panel {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bark-light) var(--bark);
    }

    .organize-item {
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
    }

    .organize-item a {
      color: var(--sprout);
      text-decoration: none;
      font-family: var(--font-label);
      font-size: 10px;
    }

    .organize-item a:hover { text-decoration: underline; }

    .organize-item p {
      font-size: 9px;
      color: var(--text-muted);
      margin: 2px 0 0;
      line-height: 1.4;
    }

    #alert-panel-header {
      padding: 8px 16px 4px;
      font-family: var(--font-label);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--bark);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #alert-count-badge {
      background: var(--amber);
      color: var(--soil);
      border-radius: 8px;
      padding: 1px 6px;
      font-size: 9px;
      font-family: var(--font-label);
    }

    @keyframes alertRipple {
      0%   { transform: scale(0.85); opacity: 1; }
      100% { transform: scale(2.4);  opacity: 0; }
    }
    #alert-indicator {
      display: none;
      position: absolute;
      top: -2px;
      right: -3px;
      width: 8px;
      height: 8px;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #alert-indicator.active { display: flex; }
    #alert-indicator .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }
    #alert-indicator .ai-ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: alertRipple 1.8s ease-out infinite;
    }
    #alert-indicator.sev-1 .ai-dot,
    #alert-indicator.sev-1 .ai-ripple { background: var(--danger); }
    #alert-indicator.sev-2 .ai-dot,
    #alert-indicator.sev-2 .ai-ripple { background: var(--amber); }
    #alert-indicator.sev-3 .ai-dot,
    #alert-indicator.sev-3 .ai-ripple { background: var(--leaf); }

    .alert-item {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .alert-item:hover {
      background: var(--bark-light);
    }

    .alert-severity-1 { border-left: 3px solid var(--danger); }
    .alert-severity-2 { border-left: 3px solid var(--amber); }
    .alert-severity-3 { border-left: 3px solid var(--leaf); }

    .alert-title {
      font-family: var(--font-label);
      font-size: 11px;
      color: var(--text-primary);
    }

    .alert-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 3px;
    }

    .alert-map-toggle {
      width: 28px; height: 14px;
      border: 1px solid var(--text-muted);
      border-radius: 7px;
      background: var(--bark-light);
      position: relative;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .alert-map-toggle::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      top: 1px; left: 1px;
      transition: transform 0.15s, background 0.15s;
    }

    .alert-item.map-visible .alert-map-toggle {
      background: var(--leaf);
      border-color: var(--sprout);
    }

    .alert-item.map-visible .alert-map-toggle::after {
      transform: translateX(14px);
      background: var(--sprout);
    }

    .alert-meta {
      font-family: var(--font-label);
      font-size: 9px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }

    .claim-badge {
      display: inline-block;
      font-family: var(--font-label);
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .claim-DOCUMENTED  { background: var(--leaf);  color: var(--soil); }
    .claim-MECHANISM   { background: var(--amber); color: var(--soil); }
    .claim-CORRELATION { background: var(--bark-light); color: var(--text-secondary); border: 1px solid var(--border); }

    #no-alerts-msg {
      padding: 12px 16px;
      font-family: var(--font-label);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── Info popup (MapLibre override) ── */
    .maplibregl-popup-content {
      background: var(--bark) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      max-width: 320px !important;
      padding: 0 !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6) !important;
    }

    .maplibregl-popup-tip {
      border-top-color: var(--bark) !important;
    }

    .popup-inner {
      padding: 12px 14px;
    }

    .popup-title {
      font-family: var(--font-label);
      font-size: 12px;
      color: var(--sprout);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .popup-props {
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .popup-footer {
      border-top: 1px solid var(--border);
      padding: 8px 14px;
      font-family: var(--font-label);
      font-size: 9px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .popup-alert-caution {
      background: var(--bark-light);
      border-left: 3px solid var(--amber);
      padding: 6px 10px;
      font-size: 10px;
      color: var(--text-secondary);
      font-style: italic;
      margin: 6px 0;
    }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--soil);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-family: var(--font-label);
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-size: 28px;
      letter-spacing: 0.15em;
      color: var(--sprout);
      margin-bottom: 12px;
    }

    .loading-msg {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ── Weather panel ── */
    #weather-panel {
      padding: 10px 16px;
      overflow-y: auto;
      flex: 1;
    }

    #weather-nws-badge {
      background: var(--danger);
      color: #fff;
      border-radius: 8px;
      padding: 1px 6px;
      font-size: 8px;
      font-family: var(--font-label);
      letter-spacing: 0.05em;
    }

    #weather-current {
      font-family: var(--font-label);
      font-size: 10px;
      color: var(--text-secondary);
    }

    .weather-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .weather-icon { font-size: 13px; line-height: 1; }
    .weather-temp { color: var(--text-primary); font-size: 12px; }
    .weather-desc { color: var(--text-secondary); }
    .weather-wind { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

    #weather-aqi {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid var(--border);
      font-family: var(--font-label);
      font-size: 10px;
      color: var(--text-secondary);
    }

    .aqi-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .aqi-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }

    .aqi-value {
      font-size: 14px;
      font-weight: bold;
      line-height: 1;
    }

    .aqi-category { font-size: 9px; }

    .aqi-station {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Resource submission ── */
    #resource-section {
      padding: 8px 16px;
      overflow-y: auto;
      flex: 1;
    }

    #resource-form {
      margin-top: 8px;
    }

    #resource-form.hidden { display: none; }

    #resource-form select,
    #resource-form input,
    #resource-form textarea {
      width: 100%;
      background: var(--bark-light);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-label);
      font-size: 10px;
      padding: 5px 7px;
      border-radius: 2px;
      margin-bottom: 5px;
      box-sizing: border-box;
    }

    #resource-form textarea {
      resize: vertical;
      min-height: 48px;
      font-family: var(--font-body);
      font-size: 10px;
    }

    #resource-form select option { background: var(--bark); }

    #resource-form button[type="submit"] {
      width: 100%;
      background: var(--leaf);
      border: none;
      color: var(--soil);
      font-family: var(--font-label);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.1s;
    }

    #resource-form button[type="submit"]:hover { background: var(--sprout); }

    .form-msg {
      font-family: var(--font-label);
      font-size: 9px;
      margin-top: 5px;
      line-height: 1.4;
    }

    .form-msg-error   { color: var(--danger); }
    .form-msg-success { color: var(--sprout); }

    /* ── Navigation controls override ── */
    .maplibregl-ctrl-group {
      background: var(--bark) !important;
      border: 1px solid var(--border) !important;
    }

    .maplibregl-ctrl-group button {
      background: var(--bark) !important;
      color: var(--text-primary) !important;
    }

    .maplibregl-ctrl-group button:hover {
      background: var(--bark-light) !important;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(26,18,8,0.8) !important;
      color: var(--text-muted) !important;
      font-family: var(--font-label) !important;
      font-size: 9px !important;
    }

    .maplibregl-ctrl-attrib a { color: var(--text-muted) !important; }

    /* ── Info Drawer ── */
    #info-drawer {
      font-family: var(--font-label);
    }
    #info-drawer-body::-webkit-scrollbar { width: 4px; }
    #info-drawer-body::-webkit-scrollbar-track { background: var(--bark); }
    #info-drawer-body::-webkit-scrollbar-thumb { background: var(--bark-light); border-radius: 2px; }
  </style>
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<div id="loading" role="status" aria-live="polite" aria-label="Loading">
  <div class="loading-logo">COMMON<br>GROUND</div>
  <div class="loading-msg">Initializing community map...</div>
</div>

<div id="app">

  <!-- ── App Bar (52px icon strip) ── -->
  <nav id="app-bar" aria-label="Main navigation">
    <div id="app-bar-logo" aria-hidden="true">CG</div>
    <div class="app-bar-nav">

      <button class="app-bar-btn" data-panel="layers" title="Map Layers" aria-pressed="false">
        <div class="app-bar-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="2" y="3.5" width="16" height="3" rx="0.5"/>
            <rect x="2" y="8.5" width="16" height="3" rx="0.5"/>
            <rect x="2" y="13.5" width="16" height="3" rx="0.5"/>
          </svg>
        </div>
        <span>LAYERS</span>
      </button>

      <button class="app-bar-btn" data-panel="weather" title="Weather &amp; Air Quality" aria-pressed="false">
        <div class="app-bar-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M5 14.5a4 4 0 0 1 3.2-3.9A4.5 4.5 0 0 1 17 13.5a3 3 0 0 1-1 5.5H6a4 4 0 0 1-1-8.1"/>
          </svg>
        </div>
        <span>WEATHER</span>
      </button>

      <button class="app-bar-btn" data-panel="alerts" title="Active Alerts" aria-pressed="false">
        <div class="app-bar-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M10 3a6 6 0 0 0-6 6c0 2.8 1.4 5.2 2.5 6.5h7C14.6 14.2 16 11.8 16 9a6 6 0 0 0-6-6z"/>
            <path d="M8.5 16.5a1.5 1.5 0 0 0 3 0"/>
          </svg>
          <span id="alert-indicator" aria-hidden="true">
            <span class="ai-ripple"></span>
            <span class="ai-dot"></span>
          </span>
        </div>
        <span>ALERTS</span>
        <span id="alert-count-badge" class="app-bar-count" style="display:none">0</span>
      </button>

      <button class="app-bar-btn" data-panel="organize" title="Organizing" aria-pressed="false">
        <div class="app-bar-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="10" cy="5" r="2"/>
            <circle cx="4" cy="15" r="2"/>
            <circle cx="16" cy="15" r="2"/>
            <line x1="10" y1="7" x2="4.8" y2="13"/>
            <line x1="10" y1="7" x2="15.2" y2="13"/>
            <line x1="4" y1="13" x2="16" y2="13"/>
          </svg>
        </div>
        <span>ORGS</span>
      </button>

    </div>
    <div class="app-bar-bottom">
      <button class="app-bar-btn" data-panel="submit" title="Submit a Resource" aria-pressed="false">
        <div class="app-bar-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="10" cy="10" r="7.5"/>
            <line x1="10" y1="6.5" x2="10" y2="13.5"/>
            <line x1="6.5" y1="10" x2="13.5" y2="10"/>
          </svg>
        </div>
        <span>SUBMIT</span>
      </button>
    </div>
  </nav>

  <!-- ── Side Panel (slides in/out) ── -->
  <div id="side-panel">
    <h1 class="sr-only">CommonGround — Community Map</h1>

    <!-- Layers Panel -->
    <div class="panel" id="panel-layers">
      <div class="panel-header">
        <span class="panel-header-title">MAP LAYERS</span>
        <button class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div id="layer-controls">
        <!-- populated by layers.js -->
        <div class="section-label" style="padding: 10px 16px 4px;">Loading layers...</div>
      </div>
    </div>

    <!-- Weather Panel -->
    <div class="panel" id="panel-weather">
      <div class="panel-header">
        <span class="panel-header-title">WEATHER &amp; AQI</span>
        <span id="weather-nws-badge" style="display:none"></span>
        <button class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div id="weather-panel">
        <div id="weather-current">—</div>
        <div id="weather-aqi">—</div>
      </div>
    </div>

    <!-- Alerts Panel -->
    <div class="panel" id="panel-alerts">
      <div class="panel-header">
        <span class="panel-header-title">ALERTS</span>
        <button class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div id="alert-panel">
        <div id="alert-list" role="status" aria-live="polite" aria-label="Active alerts">
          <div id="no-alerts-msg">No active alerts for this area.</div>
        </div>
      </div>
    </div>

    <!-- Organizing Panel -->
    <div class="panel" id="panel-organize">
      <div class="panel-header">
        <span class="panel-header-title">ORGANIZING</span>
        <button class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div id="organize-panel">
        <div id="organize-list">
          <div id="organize-loading" style="padding:8px 16px;font-family:var(--font-label);font-size:9px;color:var(--text-muted)">Loading…</div>
        </div>
      </div>
    </div>

    <!-- Submit Resource Panel -->
    <div class="panel" id="panel-submit">
      <div class="panel-header">
        <span class="panel-header-title">SUBMIT RESOURCE</span>
        <button class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div id="resource-section">
        <form id="resource-form">
          <div class="form-group">
            <label for="res-type" class="sr-only">Resource Type (required)</label>
            <select id="res-type" name="type" required>
              <option value="" disabled selected>Type *</option>
              <option value="food_pantry">Food Pantry</option>
              <option value="mutual_aid">Mutual Aid</option>
              <option value="health_clinic">Health Clinic</option>
              <option value="community_center">Community Center</option>
              <option value="shelter">Shelter</option>
              <option value="community_fridge">Community Fridge</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="res-name" class="sr-only">Name (required)</label>
            <input id="res-name" name="name" type="text" placeholder="Name *" required maxlength="200">
          </div>
          <div class="form-group">
            <label for="res-address" class="sr-only">Address (required)</label>
            <input id="res-address" name="address" type="text" placeholder="Address *" required maxlength="300">
          </div>
          <div class="form-group">
            <label for="res-description" class="sr-only">Description (optional)</label>
            <textarea id="res-description" name="description" placeholder="Description (optional)" maxlength="1000"></textarea>
          </div>
          <div class="form-group">
            <label for="res-contact" class="sr-only">Contact (optional)</label>
            <input id="res-contact" name="contact" type="text" placeholder="Contact (optional)" maxlength="200">
          </div>
          <button type="submit">Submit for Review</button>
        </form>
        <div id="resource-form-msg" class="form-msg"></div>
      </div>
    </div>

  </div>

  <!-- ── Map ── -->
  <main id="main-content" style="display:contents">
  <div id="map-container">
    <div id="map"></div>
  </div>
  </main>
  <!-- ── Status bar ── -->
  <div id="status-bar" role="contentinfo">
    <span id="coords">–</span>
    <span id="status-msg" role="status" aria-live="polite">READY</span>
    <span>CommonGround v1.0 · AGPL-3.0 · <a href="https://github.com/your-org/commonground" style="color:var(--text-muted)">source</a> · <a href="/admin.html" style="color:var(--text-muted)">admin</a></span>
  </div>

</div>

<!-- MapLibre GL JS — vendored, no CDN -->
<script src="vendor/maplibre-gl.js"></script>
<!-- App bundle -->
<script src="app.bundle.js"></script>

</body>
</html>
