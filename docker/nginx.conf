server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to all locations not explicitly overriding add_header.
    # NOTE: nginx inherits add_header from parent ONLY when the child block has NO
    # add_header directives of its own. Any location below that needs its own
    # Cache-Control header must re-declare all security headers.
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "DENY"              always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "no-referrer"       always;
    add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
    # CSP: scripts only from self + blob: (MapLibre workers); tiles/API via https:
    # 'unsafe-inline' for style-src is required by MapLibre GL (injects inline styles).
    # Tile provider is configurable — connect-src and img-src allow https: broadly.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: blob:; font-src 'self' data:; frame-ancestors 'none';" always;

    # Cache static assets aggressively; HTML not cached (enables cache-busting).
    # Security headers are re-declared because add_header in a location block
    # overrides all parent-level add_header directives (nginx inheritance rule).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options  "nosniff"           always;
        add_header X-Frame-Options         "DENY"              always;
        add_header X-XSS-Protection        "1; mode=block"     always;
        add_header Referrer-Policy         "no-referrer"       always;
        add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: blob:; font-src 'self' data:; frame-ancestors 'none';" always;
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options  "nosniff"           always;
        add_header X-Frame-Options         "DENY"              always;
        add_header X-XSS-Protection        "1; mode=block"     always;
        add_header Referrer-Policy         "no-referrer"       always;
        add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: blob:; font-src 'self' data:; frame-ancestors 'none';" always;
    }

    # No access logging for favicon/robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Proxy API requests to the API container — keeps browser on same origin,
    # which satisfies connect-src 'self' in the CSP without adding http: exceptions.
    location /api/ {
        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback — uncomment if using client-side routing in future phases
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    # Disable directory listing
    autoindex off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;
}
