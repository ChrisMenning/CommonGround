services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       commonground
      POSTGRES_USER:     commonground
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # bind to loopback only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commonground -d commonground"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CommonGround API ─────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               3000
      DB_HOST:            db
      DB_PORT:            5432
      DB_NAME:            commonground
      DB_USER:            commonground
      DB_PASSWORD:        ${DB_PASSWORD:-changeme_in_production}
      CORS_ORIGIN:        ${CORS_ORIGIN:-http://localhost:3001}
      NWS_USER_AGENT:     ${NWS_USER_AGENT:-CommonGround/1.0 (contact@example.org)}
      AIRNOW_API_KEY:     ${AIRNOW_API_KEY:-}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX:     120
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend (nginx serving static build) ───────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Ingest scheduler (auto-fetchable seeds only) ─────────────────────────
  # Runs AirNow hourly, FQHC + OSM weekly.
  # Manual-download seeds (EJScreen, SVI, etc.) must be run separately:
  #   docker compose run --rm ingest node run-all.js
  ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persists boundary GeoJSON downloads and makes host-side CSVs readable
      - ../ingest/data:/app/data
    environment:
      DB_HOST:        db
      DB_PORT:        5432
      DB_NAME:        commonground
      DB_USER:        commonground
      DB_PASSWORD:    ${DB_PASSWORD:-changeme_in_production}
      AIRNOW_API_KEY: ${AIRNOW_API_KEY:-}
      NWS_USER_AGENT: ${NWS_USER_AGENT:-CommonGround/1.0 (contact@example.org)}

volumes:
  pgdata:
    driver: local
